<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WasteInstitute — Certificate in Healthcare Waste Management</title>
<meta name="description" content="Professional Certificate in Healthcare Waste Management: Compliance, Auditing, and the HTM 07-01 Framework. Developed by WasteInstitute.">
<meta name="author" content="WasteInstitute">
<link rel="icon" type="image/jpeg" href="./assets/favicon.jpg">
<link rel="stylesheet" href="./style.css?v=20260308-2">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="./assets/logo-white.png" alt="WasteInstitute" class="sidebar-logo">
        <div class="sidebar-course-title">Certificate in Healthcare Waste Management</div>
        <div class="sidebar-progress">
          <div class="sidebar-progress-label">
            <span>Progress</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="sidebar-progress-bar">
            <div class="sidebar-progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Populated by JS -->
      </nav>
      <div class="sidebar-final" id="sidebar-final">
        <div class="sidebar-final-label">Final Assessment</div>
        <div class="sidebar-final-title">25 Questions • 60 min</div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <a class="header-logo-link" onclick="navigateTo('landing')" title="WasteInstitute Home">
          <img src="./assets/logo-white.png" alt="WasteInstitute" class="header-logo">
        </a>
        <div class="breadcrumb" id="breadcrumb">
          <span class="breadcrumb-current">Course Home</span>
        </div>
        <div class="header-actions">
          <div class="header-progress-pill">
            <svg class="header-progress-ring" viewBox="0 0 20 20">
              <circle cx="10" cy="10" r="8" fill="none" stroke="#E5E7EB" stroke-width="2.5"/>
              <circle cx="10" cy="10" r="8" fill="none" stroke="#00B300" stroke-width="2.5"
                      stroke-dasharray="50.27" stroke-dashoffset="50.27" stroke-linecap="round"
                      transform="rotate(-90 10 10)" id="header-progress-circle"/>
            </svg>
            <span id="header-progress-text">0% Complete</span>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content-area" id="content-area">
        <!-- Populated by JS -->
        <div style="display:flex;align-items:center;justify-content:center;height:60vh;">
          <div style="text-align:center;">
            <div style="font-size:40px;margin-bottom:16px;">📚</div>
            <div style="font-size:16px;color:#6B7280;">Loading course content...</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scroll to Top -->
  <button class="scroll-top-btn" id="scroll-top-btn" aria-label="Scroll to top">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M10 16V4M4 10l6-6 6 6"/>
    </svg>
  </button>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script src="./app.js?v=20260308-2"></script>
</body>
</html>
